name: Run Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug tree
        run: |
          pwd
          node -v
          npm -v
          ls
          ls commands || echo "no commands dir"
          ls lib || echo "no lib dir"
          ls test || echo "no test dir"

      - name: Run tests
        run: npm run test
